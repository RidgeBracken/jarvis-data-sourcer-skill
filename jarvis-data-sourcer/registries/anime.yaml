# Starter registry extracted from references/source-discovery.md.
# Verify URLs, feeds, permissions, robots.txt, and terms before production use.
#
# Platform-source access rules (apply to ALL platform-typed entries below).
# These are non-negotiable per ../SKILL.md Hard Safety Rules.
#   twitter/x        -> Use ONLY official paid X API. Do not scrape X / x.com HTML.
#                       Handle lists below are attribution metadata for editorial
#                       use (citing accounts in summaries), NOT scrape targets.
#   discord          -> Use ONLY official Discord API with a bot installed in the
#                       target server by operator consent. No DM scraping.
#   reddit_community -> Use reddit.com/r/<sub>.rss for titles/URLs only, or the
#                       official OAuth API. Never scrape usernames, comments, or
#                       full post bodies. Treat reddit handles as PII.
#   youtube          -> Use channel RSS
#                       (https://www.youtube.com/feeds/videos.xml?channel_id=...)
#                       or YouTube Data API v3. Do not scrape watch pages.
#   linkedin, instagram, facebook, tiktok -> Default deny. Add only with explicit
#                       operator policy review and verified ToS permission.
#
# Verified flag semantics (S28):
#   verified: true       -> Endpoint or feed URL was confirmed reachable and
#                            returning new content within the last 90 days as of
#                            top-level last_verified. Stale entries should be
#                            re-checked.
#   verified: false      -> Endpoint exists but was not tested in this snapshot.
#   verified absent      -> Has not been investigated; treat as
#                            needs_verification.
#
# Topic: Anime

topic: "Anime"
description: "Anime announcements, season releases, licensing news, simulcast schedules, industry news"
last_verified: "2026-05-14"  # ISO date this registry was last spot-checked end-to-end
official_entity: "Multiple: Crunchyroll, Funimation (Sony), Sentai Filmworks, Aniplex, etc."
source_types_to_discover:
  - type: "industry_news_site"
    search_queries: ["Anime News Network RSS"]
    expected_url_pattern: "animenewsnetwork.com"
    rss_feed: "animenewsnetwork.com/all/rss.xml"
    verified: true
    notes: "Anime News Network (ANN) is the leading anime news site; RSS confirmed"

  - type: "streaming_service"
    search_queries: ["Crunchyroll news RSS"]
    expected_url_pattern: "crunchyroll.com/news"
    rss_feed: "feeds.feedburner.com/crunchyroll/animenews"
    notes: "Crunchyroll news feed; note â€” this feed may be intermittently active, verify"

  - type: "official_youtube"
    channels: ["Crunchyroll", "Funimation"]
    verified: true

  - type: "twitter/x"
    handles: ["@AnimeNewsNet", "@Crunchyroll"]

  - type: "seasonal_tracker"
    search_queries: ["LiveChart anime seasonal RSS"]
    expected_url_pattern: "livechart.me"
    notes: "LiveChart is a popular seasonal anime tracker; check for RSS"

  - type: "news_outlets"
    outlets: ["Crunchyroll News", "Anime News Network", "MyAnimeList News", "Otaku USA"]
    rss_feeds: ["animenewsnetwork.com/all/rss.xml"]
    verified: true

  - type: "reddit_community"
    subreddits: ["r/anime", "r/manga", "r/Animedubs"]
    rss_available: true

  - type: "simulcast_schedule"
    search_queries: ["anime simulcast schedule RSS"]
    notes: "Crunchyroll seasonal schedule; may not have RSS"

  - type: "newsletter"
    newsletters: ["Anime News Network Newsletter"]

status: "partially_verified"
notes: |
  Anime news ecosystem:
  - Anime News Network (ANN) is the PRIMARY source; RSS at all/rss.xml (CONFIRMED)
  - Crunchyroll has a news feed via FeedBurner; verify if still active (intermittent issues reported)
  - MyAnimeList has news section; check for RSS
  - Seasonal anime tracking: livechart.me, anichart.net
  - r/anime is a major community hub with scheduled discussion threads
  - Japanese sources (Oricon News Natalie, Mantan Web) for primary Japanese industry news
    â€” requires Japanese language ability
  Key news types: seasonal announcements, licensing deals, production committee news,
  VA (seiyuu) announcements, BD/DVD sales figures.

# Sources investigated and intentionally excluded.
# Future agents: do not re-test these. If a source previously failed
# validation, violated ToS, or proved unreliable, record it here with a
# short reason so the next agent doesn't waste cycles re-discovering it.
# Format: { url|domain|name, reason, excluded_at }.
excluded: []
