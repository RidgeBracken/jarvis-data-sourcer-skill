# Quality whitelist — operator-controlled domain allowlist with score floors.
# Referenced by `references/quality-scoring.md` D8.1 (Whitelist Override) and
# `references/security.md` §8.2 (Initial Allowlist).
#
# This file is INTENTIONALLY operator-customizable. The defaults below are
# the original Jarvis HQ deployment's allowlist. Add or remove domains based
# on your topic mix; review at least annually.
#
# Semantics:
#   premium: Tier 1 floor (final_score >= 92). Auto-include with notification.
#   standard: Tier 2 floor (final_score >= 85). Standard digest inclusion.
#
# Each entry should include:
#   domain        - exact hostname (no path, no scheme)
#   reason        - one-line justification
#   reviewed_by   - admin or operator handle
#   added_at      - YYYY-MM-DD
#   review_due    - YYYY-MM-DD (typically +12 months)

