# Starter registry extracted from references/source-discovery.md.
# Verify URLs, feeds, permissions, robots.txt, and terms before production use.
#
# Platform-source access rules (apply to ALL platform-typed entries below).
# These are non-negotiable per ../SKILL.md Hard Safety Rules.
#   twitter/x        -> Use ONLY official paid X API. Do not scrape X / x.com HTML.
#                       Handle lists below are attribution metadata for editorial
#                       use (citing accounts in summaries), NOT scrape targets.
#   discord          -> Use ONLY official Discord API with a bot installed in the
#                       target server by operator consent. No DM scraping.
#   reddit_community -> Use reddit.com/r/<sub>.rss for titles/URLs only, or the
#                       official OAuth API. Never scrape usernames, comments, or
#                       full post bodies. Treat reddit handles as PII.
#   youtube          -> Use channel RSS
#                       (https://www.youtube.com/feeds/videos.xml?channel_id=...)
#                       or YouTube Data API v3. Do not scrape watch pages.
#   linkedin, instagram, facebook, tiktok -> Default deny. Add only with explicit
#                       operator policy review and verified ToS permission.
#
# Verified flag semantics (S28):
#   verified: true       -> Endpoint or feed URL was confirmed reachable and
#                            returning new content within the last 90 days as of
#                            top-level last_verified. Stale entries should be
#                            re-checked.
#   verified: false      -> Endpoint exists but was not tested in this snapshot.
#   verified absent      -> Has not been investigated; treat as
#                            needs_verification.
#
# Topic: Anthropic / Claude

topic: "Anthropic / Claude"
description: "Anthropic AI updates, Claude model releases, API changes, safety research"
last_verified: "2026-05-14"  # ISO date this registry was last spot-checked end-to-end
official_entity: "Anthropic"
source_types_to_discover:
  - type: "official_blog"
    search_queries: ["Anthropic blog", "Anthropic news"]
    expected_url_pattern: "anthropic.com/news"
    verified: true
    notes: "Canonical source â€” every model release and policy update posted here"

  - type: "rss_feed"
    search_queries: ["Anthropic RSS feed", "Anthropic news RSS"]
    expected_url_pattern: "anthropic.com/news/rss"
    notes: "Feed exists for /news section; verify exact URL"

  - type: "engineering_blog"
    search_queries: ["Anthropic engineering blog"]
    expected_url_pattern: "anthropic.com/engineering"
    notes: "Engineering blog exists at /engineering; may have separate RSS from /news"

  - type: "changelog"
    expected_url_pattern: "docs.anthropic.com/en/release-notes"
    search_queries: ["Anthropic API changelog", "Claude changelog"]
    verified: true
    notes: "API release notes at docs.anthropic.com â€” covers API changes, new parameters, deprecations"

  - type: "github_releases"
    repos: ["anthropics/anthropic-sdk-python", "anthropics/anthropic-sdk-typescript"]
    expected_url_pattern: "github.com/anthropics"
    verified: true

  - type: "developer_docs"
    expected_url_pattern: "docs.anthropic.com"
    verified: true
    notes: "Comprehensive API documentation with changelogs"

  - type: "youtube"
    channels: ["Anthropic"]
    search_queries: ["Anthropic YouTube"]

  - type: "twitter/x"
    handles: ["@AnthropicAI"]
    verified: true
    notes: "Fast signal for releases; model announcements get threads here"

  - type: "discord"
    server: "Anthropic"
    channels: ["#announcements", "#api-and-sdk"]
    notes: "Discord announcements often come before news page; requires Discord account"

  - type: "news_outlets"
    outlets: ["TechCrunch AI", "The Verge AI", "Ars Technica AI"]

  - type: "reddit_community"
    subreddits: ["r/ClaudeAI"]
    rss_available: true

  - type: "newsletter"
    newsletters: ["Import AI", "The Batch", "TLDR AI"]

status: "partially_verified"
notes: |
  Four primary sources cover nearly all Anthropic updates:
  1. anthropic.com/news (canonical news RSS)
  2. docs.anthropic.com (API changelog)
  3. Discord #announcements channel
  4. @AnthropicAI on X/Twitter
  Engineering blog at /engineering is separate from /news and may have its own feed.
  GitHub org "anthropics" confirmed with public SDK repos.

# Sources investigated and intentionally excluded.
# Future agents: do not re-test these. If a source previously failed
# validation, violated ToS, or proved unreliable, record it here with a
# short reason so the next agent doesn't waste cycles re-discovering it.
# Format: { url|domain|name, reason, excluded_at }.
excluded: []
